### model
model_name_or_path: Qwen/Qwen3-8B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_alpha: 32
lora_dropout: 0.05
lora_rank: 16
lora_target: all

### dataset
dataset: math_rationale_cold_data_10k_rationale
template: alpaca
dataset_dir: ./sft_data
cutoff_len: 4096
max_samples: 10000
preprocessing_num_workers: 16

### output
output_dir: ./sft-model/lora/MathSmith-Qwen3-8B-no_prove-rationale-8epochs
logging_steps: 5
save_steps: 80
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb

### train
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
learning_rate: 1.0e-04
num_train_epochs: 8.0
lr_scheduler_type: cosine
warmup_steps: 50
bf16: true
ddp_timeout: 180000000
flash_attn: auto
include_num_input_tokens_seen: true
max_grad_norm: 1.0
optim: adamw_torch
packing: false

